scenarios:
  - id: shaping-defines-readiness
    skill: solodeveling-shaping-work
    must_contain:
      - "acceptance criteria"
      - "out of scope"
      - "alternatives"
      - "ready"

  - id: quick-planning-remains-lightweight
    skill: solodeveling-planning-work
    must_contain:
      - "Quick"
      - "smallest useful plan"
      - "verification"

  - id: critical-planning-includes-recovery
    skill: solodeveling-planning-work
    must_contain:
      - "Critical"
      - "security"
      - "recovery"

  - id: execution-preserves-user-changes
    skill: solodeveling-executing-work
    must_contain:
      - "dirty worktree"
      - "preserve"
      - "one primary agent"
      - "before any implementation edit"

  - id: debugging-precedes-fix
    skill: solodeveling-debugging
    must_contain:
      - "reproduce"
      - "root cause"
      - "failing regression"
      - "before implementation"

  - id: verification-failure-blocks-done
    skill: solodeveling-verifying
    must_contain:
      - "recent evidence"
      - "acceptance criterion"
      - "must not transition to done"
      - "unverified"

  - id: verification-depth-follows-impact
    skill: solodeveling-verifying
    must_contain:
      - Quick
      - focused check
      - Standard
      - affected regression
      - Critical
      - broad gate

  - id: frontend-iteration-uses-one-batch
    skill: solodeveling-executing-work
    must_contain:
      - "same-surface frontend design batch"
      - "focused visual"
      - "commit, handoff"
      - "not after each micro-change"

  - id: broad-verification-is-checkpointed
    skill: solodeveling-verifying
    must_contain:
      - "broad gates once"
      - "Reuse a broad result"
      - "later change crosses"

  - id: evidence-keeps-one-current-contract
    skill: solodeveling-verifying
    must_contain:
      - "Current acceptance matrix"
      - "Superseded by"
      - "short"
      - "changelog"

  - id: standard-delivery-owns-one-loop
    skill: solodeveling-standard-delivery
    must_contain:
      - shape, plan, execute, and verify
      - Persist `active` once
      - persist `done`, and archive once
      - session, is blocked

  - id: standard-delivery-keeps-compact-artifacts
    skill: solodeveling-standard-delivery
    must_contain:
      - 30–40 lines
      - implementation plan
      - verification mapping
      - AC -> result -> evidence -> limitation

  - id: standard-delivery-reuses-and-triages-evidence
    skill: solodeveling-standard-delivery
    must_contain:
      - Reuse a current result
      - manual browser review
      - transient by default
      - rerun once
      - route the reproducible or unexplained failure

  - id: backend-quick-carveout-fails-closed
    skill: solodeveling
    must_contain:
      - Queries and APIs default to Standard
      - every carve-out
      - does not select or expose new sensitive data
      - Authentication, authorization
      - focused contract test
      - Any uncertainty

  - id: backend-owns-one-boundary-record
    skill: solodeveling
    must_contain:
      - one boundary record
      - Authority
      - Invariant
      - Failure
      - Verification
      - Recovery
      - EVIDENCE records

  - id: backend-broad-gates-are-effect-specific
    skill: solodeveling
    must_contain:
      - focused minimums, not a command checklist
      - Applicable
      - Run the full suite once
      - Do not run a broad gate merely because

  - id: backend-triage-separates-capability-from-source
    skill: solodeveling
    must_contain:
      - fixture or mock
      - unavailable local database
      - Missing credentials
      - migration target
      - Never use real credentials

  - id: additive-migration-has-a-standard-template
    skill: solodeveling
    must_contain:
      - additive, reversible migration
      - fresh schema
      - existing representative pre-migration schema
      - old/new application compatibility
      - Production execution still requires separate authority

  - id: no-core-workflow-requires-subagents
    skill: solodeveling-executing-work
    must_contain:
      - "Do not require subagents"
    must_not_contain:
      - "subagents are required"
  - id: router-selects-lifecycle-skills
    skill: solodeveling
    must_contain:
      - solodeveling-standard-delivery
      - "captured -> shaped -> ready -> active -> verifying -> done"
      - "solodeveling-shaping-work"
      - "solodeveling-planning-work"
      - "solodeveling-executing-work"
      - "solodeveling-debugging"
      - "solodeveling-verifying"
