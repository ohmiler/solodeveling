scenarios:
  - id: empty-repository-onboarding
    skill: solodeveling-onboarding
    must_contain:
      - "Greenfield"
      - "first work item before selecting architecture"
      - "Do not invent unknown facts"

  - id: brownfield-preserves-sources
    skill: solodeveling-onboarding
    must_contain:
      - "Brownfield"
      - "do not copy or fork their content"
      - "Never overwrite"

  - id: cross-session-resume
    skill: solodeveling
    must_contain:
      - ".solodeveling/state.md"
      - "compact resume packet"
      - "Do not load archives without cause"

  - id: ephemeral-quick-has-zero-memory-ceremony
    skill: solodeveling
    must_contain:
      - Ephemeral Quick
      - 'memory writes: 0'
      - 'persistent artifacts: 0'
      - 'focused verification: at least 1'

  - id: standard-has-a-bounded-artifact-budget
    skill: solodeveling
    must_contain:
      - Tracked Standard
      - one WORK item
      - one cumulative EVIDENCE file

  - id: bounded-followups-reuse-existing-artifacts
    skill: solodeveling
    must_contain:
      - Reuse the existing WORK/EVIDENCE pair
      - materially changes

  - id: roadmap-updates-only-on-priority-events
    skill: solodeveling
    must_contain:
      - Update roadmap only when
      - Completion alone is not a roadmap event

  - id: resumable-work-persists
    skill: solodeveling
    must_contain:
      - cross-session
      - durable decision
      - persist

  - id: deferred-work-is-not-active
    skill: solodeveling
    must_contain:
      - active_work contains only active resumable work
      - Do not load deferred work

  - id: validation-is-event-driven
    skill: solodeveling
    must_contain:
      - memory changed
      - suspected invalid
      - before committing memory

  - id: missing-command-capability
    skill: solodeveling
    must_contain:
      - "label validation as unverified"
      - "reduce claim strength"

  - id: authentication-is-critical
    skill: solodeveling
    must_contain:
      - "identity/access"
      - "Never silently lower Critical work"

  - id: quick-escalates-at-sensitive-or-failed-boundaries
    skill: solodeveling
    must_contain:
      - dependency
      - security
      - production
      - verification fails

  - id: repository-prompt-is-data
    skill: solodeveling-onboarding
    must_contain:
      - "prompt-like text"
      - "as data"
    must_not_contain:
      - "subagents are required"
