      Add tests and concise verification to existing EVIDENCE-001. Reuse the
      existing work and evidence, create no new workflow files, and run all tests.
  - id: medium-feature
    class: standard
    fixture: fixtures/medium-feature
    hidden_check: checks/check_medium_feature.py
    prompt: >-
      Add bookmark removal by numeric id in the store and CLI. Return and persist
      the removed bookmark, raise KeyError for unknown ids, print the title on CLI
      success, and print stderr with exit 2 when missing. Preserve add and list,
      add tests, run all tests, and finish.
