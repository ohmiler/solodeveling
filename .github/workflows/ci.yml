name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install ".[dev]"
      - name: Run regression tests
        run: python -m pytest -q
      - name: Validate canonical skill suite
        run: python scripts/validate_skill_suite.py
      - name: Validate protocol artifacts
        run: python -m solodeveling_protocol.cli .
      - name: Compile Python sources
        run: python -m compileall -q src tests scripts
      - name: Check dependency health
        run: python -m pip check

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install ".[dev]"
      - name: Build source-bound non-publishing candidate
        run: python scripts/build_candidate.py ci-release --source-revision "$GITHUB_SHA"
      - name: Inspect candidate, SBOM, contents, and checksums
        run: python scripts/verify_candidate.py ci-release --source-revision "$GITHUB_SHA"
      - name: Verify installed commands outside checkout
        run: |
          python -m pip install --force-reinstall --no-deps ci-release/*.whl
          python scripts/smoke_installed.py "$RUNNER_TEMP/solodeveling-installed-smoke"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: solodeveling-distributions
          path: ci-release/
          if-no-files-found: error
