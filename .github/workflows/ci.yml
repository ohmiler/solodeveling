name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install ".[dev]"
      - name: Run regression tests
        run: python -m pytest -q
      - name: Validate canonical skill suite
        run: python scripts/validate_skill_suite.py
      - name: Validate protocol artifacts
        run: python -m solodeveling_protocol.cli .
      - name: Compile Python sources
        run: python -m compileall -q src tests scripts
      - name: Check dependency health
        run: python -m pip check

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install ".[dev]"
      - name: Build non-publishing release bundle
        run: python scripts/build_release.py ci-release
      - name: Inspect release contents and checksums
        run: python scripts/verify_release.py ci-release
      - name: Verify installed commands outside checkout
        run: |
          python -m pip install --force-reinstall --no-deps ci-release/*.whl
          python scripts/smoke_installed.py "$RUNNER_TEMP/solodeveling-installed-smoke"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: solodeveling-distributions
          path: ci-release/
          if-no-files-found: error
